<!DOCTYPE html>

<meta charset="utf-8">

<style>
  :root{
    --bg:#EDEAE2; --panel:#FFFFFF; --panel-alt:#F5F2ED; --panel-alt2:#F8F7F4; --dash-bg:#F0F1F4;
    --navy:#0A2540; --navy2:#173a5e; --text:#0A2540; --text-soft:rgba(10,37,64,0.55); --text-softer:rgba(10,37,64,0.45);
    --border:rgba(10,37,64,0.08); --border2:rgba(10,37,64,0.15);
    --terracotta:#C36B4E; --amber:#D98E2B; --green:#3FA672; --red:#D9584F;
    --input-bg:#F8F7F4; --card-shadow:0 2px 10px rgba(10,37,64,0.05);
  }
  [data-theme="dark"]{
    --bg:#041B2D; --panel:#0B3B5C; --panel-alt:#0A3355; --panel-alt2:#0A3355; --dash-bg:#031525;
    --navy:#00121F; --navy2:#0B3B5C; --text:#F3F6F8; --text-soft:rgba(243,246,248,0.65); --text-softer:rgba(243,246,248,0.48);
    --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.16);
    --terracotta:#D98164; --amber:#E4A24A; --green:#4FBE84; --red:#E4685C;
    --input-bg:#0A3355; --card-shadow:0 2px 12px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'IBM Plex Sans Arabic','IBM Plex Sans',system-ui,sans-serif;background:var(--bg);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.25);border-radius:4px;}
  input[type=range].mzRange{-webkit-appearance:none;appearance:none;height:6px;border-radius:4px;background:var(--border2);outline:none;}
  input[type=range].mzRange::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--terracotta);cursor:pointer;border:3px solid var(--panel);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
  input.mzText{width:100%;border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:13px;font-family:inherit;color:var(--text);outline:none;background:var(--panel);}
  input.mzText:focus{border-color:var(--terracotta);}

  .modeSwitch{position:sticky;top:0;z-index:100;background:var(--navy);display:flex;gap:8px;padding:12px 16px;justify-content:space-between;align-items:center;flex-wrap:wrap;}
  .modeGroup{display:flex;gap:8px;}
  .modeBtn{border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.7);border-radius:20px;padding:8px 16px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
  .modeBtn.active{background:var(--terracotta);color:#fff;border-color:var(--terracotta);}
  .ctrlBtn{border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.06);color:#fff;border-radius:20px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}

  .iosDevice{width:402px;height:874px;border-radius:48px;overflow:hidden;position:relative;background:#000;box-shadow:0 40px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.12);flex-shrink:0;}
  .iosIsland{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;border-radius:24px;background:#000;z-index:50;}
  .iosHome{position:absolute;bottom:0;left:0;right:0;z-index:60;height:34px;display:flex;justify-content:center;align-items:flex-end;padding-bottom:8px;pointer-events:none;}
  .iosHome div{width:139px;height:5px;border-radius:100px;background:rgba(255,255,255,0.7);}
  .iosScreen{height:100%;display:flex;flex-direction:column;overflow:hidden;}

  .errMsg{color:var(--red);font-size:11.5px;font-weight:600;margin-top:6px;display:flex;align-items:center;gap:5px;}
</style>
</head>
<body id="pageBody">

<div class="modeSwitch">
  <div class="modeGroup">
    <div style="color:#fff;font-weight:700;font-size:13px;padding:8px 4px;">معاون · Muawen</div>
  </div>
  <div class="modeGroup">
    <button class="ctrlBtn" id="langBtn" onclick="toggleLang()"></button>
    <button class="ctrlBtn" id="themeBtn" onclick="toggleTheme()"></button>
  </div>
</div>


<div id="dashView" style="min-height:100vh;background:var(--dash-bg);">
  <div id="dashInner" style="display:flex;min-height:100vh;min-width:1440px;"></div>
</div>

/* generic direction-aware stepper: DOM order is always [minus, display, plus].
   Wrapping the row in the current text direction naturally flips which side
   minus/plus land on, matching how "increase" should read in that language. */
function stepperRow(minusHandler, displayHtml, plusHandler, extraStyle=''){
  return `<div dir="${dirOf()}" style="display:flex;align-items:center;justify-content:space-between;gap:10px;${extraStyle}">
    <button onclick="${minusHandler}" style="width:28px;height:28px;border-radius:50%;border:none;background:var(--panel);box-shadow:0 1px 2px rgba(0,0,0,0.15);font-size:16px;font-weight:700;color:var(--text);font-family:inherit;cursor:pointer;flex-shrink:0;">−</button>
    <div style="text-align:center;flex:1;">${displayHtml}</div>
    <button onclick="${plusHandler}" style="width:28px;height:28px;border-radius:50%;border:none;background:var(--panel);box-shadow:0 1px 2px rgba(0,0,0,0.15);font-size:16px;font-weight:700;color:var(--text);font-family:inherit;cursor:pointer;flex-shrink:0;">+</button>
  </div>`;
}
/* direction-aware range slider: dir attribute set to current language direction
   so the fill/thumb travel matches natural reading direction for that language */
function rangeInput(id, min, max, step, value, onInput, extraStyle=''){
  return `<input type="range" id="${id}" class="mzRange" dir="${dirOf()}" min="${min}" max="${max}" step="${step}" value="${value}" oninput="${onInput}" style="width:100%;${extraStyle}"/>`;
}

function calcLoan48(amount){
  const income=18000, fixed=6200;
  const installment = Math.round(amount*0.0245);
  const remaining = income-fixed-installment;
  return { income, fixed, installment, remaining,
    fixedPct:(fixed/income*100).toFixed(1), instPct:(installment/income*100).toFixed(1),
    remainPct:Math.max(0,100-(fixed/income*100)-(installment/income*100)).toFixed(1) };
}

/* Lightweight slider updates — patch only the affected numbers/bars directly
   instead of calling renderDash() (which rebuilds the whole dashboard body).
   Calling renderDash() on every 'input' event during a drag was the cause of
   the sluggish, stuttery slider feel — this fixes it by keeping drag-time
   updates to a handful of textContent/style writes. */
function updateLoanSlider(val){
  dash.s2Amount = Number(val);
  const v = calcLoanDur(dash.s2Amount, dash.s2Duration);
  const tt = t();
  document.getElementById('loanBarFixed').style.width = v.fixedPct + '%';
  document.getElementById('loanBarInst').style.width = v.instPct + '%';
  document.getElementById('loanBarRemain').style.width = v.remainPct + '%';
  document.getElementById('loanInstLegend').textContent = fmt(v.installment);
  document.getElementById('loanRemainLegend').textContent = fmt(v.remaining);
  document.getElementById('loanAmtDisplay').textContent = fmt(dash.s2Amount) + ' ' + tt.currency;
}
function updateCapSlider(val){
  dash.s1BudgetCap = Number(val);
  const tt = t();
  document.getElementById('capAmtDisplay').textContent = fmt(dash.s1BudgetCap) + ' ' + tt.currency;
}

function calcLoanDur(amount, duration){
  const income=18000, fixed=6200;
  const installment = Math.round(amount*RATE_BY_DUR[duration]);
  const remaining = income-fixed-installment;
  const fixedPct=(fixed/income*100), instPct=(installment/income*100);
  return { installment, remaining, fixedPct:fixedPct.toFixed(1), instPct:instPct.toFixed(1), remainPct:Math.max(0,100-fixedPct-instPct).toFixed(1) };
}

function addToJar(){
  if(dash.jarCurrent >= dash.jarTarget) return; // hard stop at goal
  dash.jarCurrent = Math.min(dash.jarTarget, dash.jarCurrent+500);
  dash.jarConfirm = true;
  renderDash();
  setTimeout(()=>{ dash.jarConfirm=false; renderDash(); }, 2200);
}

/* --- Transfer validation: rejects 0, negative, non-numeric, and anything over balance --- */
function submitTransfer(){
  const tt = t();
  const raw = (dash.transferAmount || '').trim();
  const num = Number(raw);
  const balance = getAccounts()[1].balance; // transferring from checking account

  if(!dash.transferTo.trim()){ dash.transferError = tt.errEmptyTo; renderDash(); return; }
  if(raw === '' || isNaN(num) || !isFinite(num)){ dash.transferError = tt.errInvalidAmt; renderDash(); return; }
  if(num <= 0){ dash.transferError = tt.errZeroAmt; renderDash(); return; }
  if(num > balance){ dash.transferError = tt.errExceedsBalance; renderDash(); return; }

  dash.transferError = '';
  dash.transferDone = true;
  dash.transferRef = String(Math.floor(100000 + Math.random()*900000));
  renderDash();
}
function resetTransfer(){
  dash.transferDone=false; dash.transferTo=''; dash.transferAmount=''; dash.transferError='';
  renderDash();
}

/* ============================================================
   LIVE CHAT — calls the /api/chat serverless proxy (real Claude API,
   key stays server-side, never in this file or the browser)
   ============================================================ */
let liveChatHistory = []; // [{role:'user'|'assistant', content: string}]

function renderLiveChatLog(){
  const log = document.getElementById('liveChatLog');
  if(!log) return;
  log.innerHTML = liveChatHistory.map(m => {
    if(m.role === 'user'){
      return `<div style="align-self:flex-end;max-width:82%;background:var(--navy);border-radius:14px 14px 3px 14px;padding:12px 15px;"><div style="font-size:13.5px;color:#fff;">${escapeHtml(m.content)}</div></div>`;
    }
    if(m.role === 'typing'){
      return `<div style="align-self:flex-start;max-width:60%;background:var(--panel);border-radius:14px 14px 14px 3px;padding:12px 15px;box-shadow:0 1px 2px rgba(0,0,0,0.05);border:1px solid var(--border);opacity:0.6;font-style:italic;"><div style="font-size:13.5px;color:var(--text);">${m.content}</div></div>`;
    }
    if(m.role === 'error'){
      return `<div style="align-self:flex-start;max-width:88%;background:rgba(217,88,79,0.1);border-radius:14px 14px 14px 3px;padding:12px 15px;border:1px solid rgba(217,88,79,0.3);"><div style="font-size:13px;color:var(--red);">${escapeHtml(m.content)}</div></div>`;
    }
    return `<div style="align-self:flex-start;max-width:88%;background:var(--panel);border-radius:14px 14px 14px 3px;padding:12px 15px;box-shadow:0 1px 2px rgba(0,0,0,0.05);border:1px solid var(--border);"><div style="font-size:13.5px;line-height:1.7;color:var(--text);">${escapeHtml(m.content)}</div></div>`;
  }).join('');
  const container = log.parentElement;
  if(container) container.scrollTop = container.scrollHeight;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function sendLiveChat(){
  const input = document.getElementById('liveChatInput');
  if(!input) return;
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  liveChatHistory.push({ role:'user', content: msg });
  liveChatHistory.push({ role:'typing', content: appState.lang==='en' ? 'Muawen is typing…' : 'معاون يكتب...' });
  renderLiveChatLog();

  try{
    const historyForApi = liveChatHistory
      .filter(m => m.role==='user' || m.role==='assistant')
      .slice(0, -0) // keep all so far (typing entry not included since filtered)
      .map(m => ({ role:m.role, content:m.content }));
    // remove the just-pushed user message from history payload duplication —
    // server appends `message` itself, so history should be everything BEFORE it
    historyForApi.pop();

    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ message: msg, lang: appState.lang, history: historyForApi })
    });
    const data = await res.json();

    liveChatHistory = liveChatHistory.filter(m => m.role !== 'typing');

    if(!res.ok){
      liveChatHistory.push({ role:'error', content: data.error || 'Request failed.' });
    } else {
      liveChatHistory.push({ role:'assistant', content: data.reply });
    }
  } catch(err){
    liveChatHistory = liveChatHistory.filter(m => m.role !== 'typing');
    liveChatHistory.push({ role:'error', content: appState.lang==='en' ? 'Connection error. Please try again.' : 'حدث خطأ في الاتصال. حاول مجدداً.' });
    console.error(err);
  }
  renderLiveChatLog();
}

function copyIban(iban){
  navigator.clipboard?.writeText(iban).catch(()=>{});
  const tt=t(); alert(tt.copied);
}
